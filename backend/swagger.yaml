openapi: 3.0.0
info:
  title: Evently API
  description: API documentation for the Evently Event Management & Ticketing
  version: 1.0.0
servers:
  - url: http://localhost:5000/api
    description: Local development server
paths:
  /health:
    get:
      summary: API health check
      responses:
        '200':
          description: API is healthy
  /events:
    get:
      summary: Get all events
      responses:
        '200':
          description: List of events
    post:
      summary: Create a new event
      responses:
        '201':
          description: Event created
  /events/{id}:
    get:
      summary: Get event details
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Event object
  /tickets:
    post:
      summary: Register for an event
      responses:
        '201':
          description: Ticket issued
  /tickets/user/{user_id}:
    get:
      summary: Get user ticket registrations
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of tickets
